# render.yaml — déploiement ICU Smart Monitoring (1 seul hébergeur, 1 seul lien)
#
# Étapes côté Render (https://render.com -> New -> Blueprint) :
#   1) Connecte le dépôt GitHub raedomri7/smart-ICU
#   2) Render lit ce fichier et crée les 2 services ci-dessous
#   3) C'est tout : les variables d'environnement sont DÉJÀ renseignées
#      avec les URLs prévues (nom-du-service.onrender.com)
#
# Lien public final (à partager) :
#   https://smart-icu-frontend.onrender.com/dashboard

services:
  # ---------- Backend FastAPI (WebSocket temps réel) ----------
  - type: web
    name: smart-icu-backend
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: TICK_INTERVAL_S
        value: "1.0"
      # Origine CORS attendue = l'URL du frontend (pré-remplie)
      - key: CORS_ORIGINS
        value: https://smart-icu-frontend.onrender.com

  # ---------- Frontend Next.js (dashboard) ----------
  - type: web
    name: smart-icu-frontend
    runtime: node
    plan: free
    region: frankfurt
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # API REST (pré-remplie avec l'URL du backend)
      - key: NEXT_PUBLIC_API_URL
        value: https://smart-icu-backend.onrender.com/api
      # WebSocket temps réel (pré-remplie, wss://)
      - key: NEXT_PUBLIC_WS_URL
        value: wss://smart-icu-backend.onrender.com/ws
